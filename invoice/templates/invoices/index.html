<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pharma Invoice</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f4f6f9; }
        .card { border-radius: 15px; }
        th, td { vertical-align: middle; }
        /* Smaller font for smaller screens */
        @media (max-width: 768px) {
            .table-responsive { font-size: 0.85rem; }
            th, td { padding: 0.3rem; }
        }
        @media (max-width: 576px) {
            .form-label { font-size: 0.9rem; }
            button { font-size: 0.9rem; }
            input, textarea { font-size: 0.9rem; }
        }
        /* Make table inputs shrink nicely on mobile */
        .table input {
            min-width: 50px;
        }
        .table td:last-child {
            white-space: nowrap; /* Keep action button from wrapping */
        }
    </style>
</head>
<body>

<div class="container my-5">
    <div class="card shadow-lg">
        <div class="card-body">

            <h3 class="text-center mb-4">🧾 Invoice Form</h3>

            <form id="invoiceForm" method="POST" action="/generate/" novalidate>
                {% csrf_token %}

                <!-- CUSTOMER & LICENSE INFO -->
                <div class="row g-3 mb-4">
                    <div class="col-md-6 col-12">
                        <label class="form-label">Customer Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="customer_name" required>
                        <div class="invalid-feedback">Please enter customer name.</div>
                    </div>

                    <div class="col-md-6 col-12">
                        <label class="form-label">License No <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="license_no" required>
                        <div class="invalid-feedback">Please enter license number.</div>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Address <span class="text-danger">*</span></label>
                        <textarea class="form-control" name="address" rows="2" required></textarea>
                        <div class="invalid-feedback">Please enter address.</div>
                    </div>
                </div>

                <!-- ITEMS TABLE -->
                <div class="table-responsive mb-3">
                    <table class="table table-bordered table-hover align-middle">
                        <thead class="table-dark text-center">
                            <tr>
                                <th>Item <span class="text-danger">*</span></th>
                                <th>Qty <span class="text-danger">*</span></th>
                                <th>Batch</th>
                                <th>Expiry</th>
                                <th>Trade Price <span class="text-danger">*</span></th>
                                <th>Disc %</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="items-body"></tbody>
                    </table>
                </div>

                <!-- Buttons -->
                <div class="d-flex flex-wrap justify-content-between gap-2">
                    <button type="button" class="btn btn-outline-secondary mb-2" onclick="addRow()">➕ Add Item</button>
                    <button type="submit" class="btn btn-success mb-2 px-4">📄 Generate PDF</button>
                </div>

            </form>

        </div>
    </div>
</div>

<script>
    // Add new row function
    function addRow() {
        const row = document.createElement("tr");
        row.innerHTML = `
            <td><input name="item_name[]" class="form-control" required></td>
            <td><input name="qty[]" type="number" class="form-control" value="1" min="1" required></td>
            <td><input name="batch[]" class="form-control"></td>
            <td><input name="expiry[]" class="form-control" placeholder="MM/YY"></td>
            <td><input name="price[]" type="number" step="0.01" class="form-control" value="0" min="0" required></td>
            <td><input name="discount[]" type="number" class="form-control" value="0" min="0" max="100"></td>
            <td class="text-center"><button type="button" class="btn btn-danger btn-sm" onclick="removeRow(this)">❌</button></td>
        `;
        document.getElementById("items-body").appendChild(row);
    }

    // Remove a row
    function removeRow(btn) {
        const row = btn.closest("tr");
        row.remove();
    }

    // Add first row by default
    addRow();

    // Client-side validation
    (function() {
        'use strict'
        const form = document.getElementById('invoiceForm')
        form.addEventListener('submit', function(event) {
            if (!form.checkValidity()) {
                event.preventDefault()
                event.stopPropagation()
            }
            form.classList.add('was-validated')
        }, false)
    })();
</script>

</body>
</html>
